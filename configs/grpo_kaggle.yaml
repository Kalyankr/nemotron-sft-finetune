# GRPO config for Kaggle (wandb tracking)
# Run: python scripts/train_grpo.py --config configs/grpo_kaggle.yaml

tracker: wandb
experiment_name: nemotron-grpo
run_name: null
tags:
  model: nemotron-3-nano-30b
  method: grpo
  stage: rl
  env: kaggle

wandb:
  project: nemotron-reasoning
  entity: null

mlflow:
  tracking_uri: ./mlruns

training:
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  weight_decay: 0.01
  bf16: true
  gradient_checkpointing: true
  seed: 42
  num_generations: 4
  max_prompt_length: 512
  max_completion_length: 4096
  temperature: 0.7
