# Training configuration overrides
# Edit these values and pass --config configs/sft.yaml to scripts/train.py

# Experiment tracking
# tracker: "wandb" for Kaggle, "mlflow" for local, "none" to disable
tracker: mlflow
experiment_name: nemotron-sft
run_name: null  # auto-generated if null
tags:
  model: nemotron-3-nano-30b
  method: sft-lora

# wandb settings (only used when tracker=wandb)
wandb:
  project: nemotron-reasoning
  entity: null  # your wandb username or team

# mlflow settings (only used when tracker=mlflow)
mlflow:
  tracking_uri: ./mlruns  # local directory or remote server URL

training:
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  bf16: true
  max_seq_length: 4096
  gradient_checkpointing: true
  optim: adamw_torch_fused
  seed: 42

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  bias: "none"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
