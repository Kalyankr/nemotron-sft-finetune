# Kaggle-specific config: uses wandb for tracking
# Usage: python scripts/train.py --config configs/sft_kaggle.yaml

tracker: wandb
experiment_name: nemotron-sft
run_name: null
tags:
  model: nemotron-3-nano-30b
  method: sft-lora
  env: kaggle

wandb:
  project: nemotron-reasoning
  entity: null  # set to your wandb username or team

training:
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  bf16: true
  max_seq_length: 4096
  gradient_checkpointing: true
  optim: adamw_torch_fused
  seed: 42

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  bias: "none"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
